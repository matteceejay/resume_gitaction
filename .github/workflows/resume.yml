name: Build, Push, and Deploy Image

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPO_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ARN_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          disable-session-tagging: true
          role-session-name: github-actions-session

      - name: Get and decode OIDC token
        id: oidc_debug
        run: |
          ID_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          
          echo "Decoded token claims:"
          echo $ID_TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.ECR_REPO_NAME }} .

      - name: Tag Docker Image
        id: tag
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          IMAGE_TAG="${TIMESTAMP}-${GITHUB_SHA::7}"
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          
          docker tag ${{ secrets.ECR_REPO_NAME }}:latest \
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_NAME }}:latest
          
          docker tag ${{ secrets.ECR_REPO_NAME }}:latest \
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_NAME }}:$IMAGE_TAG

      - name: Push Docker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_NAME }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_NAME }}:${{ steps.tag.outputs.image-tag }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ needs.build-and-push.outputs.registry }}
            docker pull ${{ needs.build-and-push.outputs.registry }}/${{ secrets.ECR_REPO_NAME }}:latest
            
            # Stop and remove old container
            docker stop ${{ secrets.ECR_REPO_NAME }} || true
            docker rm ${{ secrets.ECR_REPO_NAME }} || true
            
            # Run new container
            docker run -d \
              --name ${{ secrets.ECR_REPO_NAME }} \
              --restart always \
              -p 80:80 \
              ${{ needs.build-and-push.outputs.registry }}/${{ secrets.ECR_REPO_NAME }}:latest